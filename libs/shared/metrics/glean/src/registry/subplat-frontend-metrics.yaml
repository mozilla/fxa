---
# Schema
$schema: moz://mozilla.org/schemas/glean/metrics/2-0-0

subscriptions:
  page_view:
    type: event
    description: |
      View for subscription management pages (e.g., management dashboard, payment method page).
    send_in_pings:
      - events
    notification_emails:
      - lchan@mozilla.com
      - subplat-team@mozilla.com
    bugs:
      - https://mozilla-hub.atlassian.net/browse/PAY-3472
    data_reviews:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2021134
    expires: never
    data_sensitivity:
      - interaction
    extra_keys:
      page_name:
        description: |
          The page reached by the user. Allowed values:
          - management
          - payment_method
        type: string
      entrypoint:
        description: |
          Where the page was reached from. Allowed values: email, internal_nav, subscription-management.
          Empty string when the source is unidentified.
        type: string

  retention_flow:
    type: event
    description: |
      Tracks the lifecycle of a retention flow decision.
      Expected success lifecycle for coupon redemption:
        view → engage (redeem_coupon) → submit (redeem_coupon) → result (redeem_coupon, redeem_success)
      Expected success lifecycle for cancellation:
        view → engage (cancel_subscription) → submit (cancel_subscription) → result (cancel_subscription, customer_canceled)
      Expected success lifecycle for stay subscribed (resubscribe):
        view → engage (stay_subscribed) → submit (stay_subscribed) → result (stay_subscribed, stay_subscribed_success)
    send_in_pings:
      - events
    notification_emails:
      - lchan@mozilla.com
      - subplat-team@mozilla.com
    bugs:
      - https://mozilla-hub.atlassian.net/browse/PAY-3472
    data_reviews:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2021134
    expires: never
    data_sensitivity:
      - interaction
    extra_keys:
      entrypoint:
        description: |
          Where the flow was entered from. Allowed values: email, internal_nav, subscription-management.
          Empty string when the source is unidentified.
        type: string
      flow_type:
        description: |
          Type of retention flow. Allowed values: cancel, stay.
        type: string
      eligibility_status:
        description: |
          Outcome of the retention eligibility evaluation for the current flow intent.
          Indicates which intervention bucket the user qualified for and is expected to
          align with the rendered screen.
          Allowed values: stay, cancel, offer, not_eligible.
        type: string
      step:
        description: |
          Stage in the user journey lifecycle. Allowed values: view, engage, submit, result.
        type: string
      action:
        description: |
          The user action taken. Only present when step is engage, submit, or result.
          Allowed values: redeem_coupon, cancel_subscription, stay_subscribed, remain_canceled.
        type: string
      outcome:
        description: |
          The category of the result. Allowed values: redeem_success, customer_canceled, stay_subscribed_success, error.
        type: string
      error_reason:
        description: |
          Specific reason for failure.
          Unexpected_exception means there may have been a network failure, validation error, server crash, etc.
          Allowed values:
          - customer_mismatch
          - discount_already_applied
          - general_error
          - no_churn_intervention_found
          - redemption_limit_exceeded
          - subscription_not_active
          - subscription_not_found
          - subscription_still_active
          - operation_denied
          - unexpected_exception
        type: string
      offering_id:
        description: The API id of the specific subscription offering.
        type: string
      interval:
        description: Billing interval for the subscription (daily | weekly | monthly | halfyearly | yearly)
        type: string
      utm_source:
        description: UTM source (if present).
        type: string
      utm_medium:
        description: UTM medium (if present).
        type: string
      utm_campaign:
        description: UTM campaign (if present).
        type: string
      nimbus_user_id:
        description: Nimbus user ID
        type: string

  interstitial_offer:
    type: event
    description: |
      Tracks engagement with the cancel interstitial offer flow.
      This flow is normally entered from the subscription management cancellation journey.
      Direct URL access is possible and may result in an error outcome if required context is missing.
      Expected success lifecycle for upgrade:
        view → engage (offer) → view (upgrade, on checkout page) → engage (upgrade) → submit (upgrade) → result (upgrade, server-side)
      Expected success lifecycle for keep subscription:
        view → engage (keep_subscription)
      Expected success lifecycle for cancellation:
        view → engage (cancel_subscription) → submit (cancel_subscription) → result (cancel_subscription, customer_canceled)
    send_in_pings:
      - events
    notification_emails:
      - lchan@mozilla.com
      - subplat-team@mozilla.com
    bugs:
      - https://mozilla-hub.atlassian.net/browse/PAY-3472
    data_reviews:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2021134
    expires: never
    data_sensitivity:
      - interaction
    extra_keys:
      entrypoint:
        description: |
          Where the flow was entered from. Allowed values: internal_nav, subscription-management.
          Empty string when the source is unidentified.
        type: string
      step:
        description: |
          Stage in the user journey lifecycle. Allowed values:
          - view
          - engage
          - submit
          - result (final state; includes outcome and optional error_reason)
        type: string
      action:
        description: |
          The user action taken. Present when step is view (to distinguish upgrade checkout view), engage, submit, or result.
          Allowed values: offer, upgrade, keep_subscription, cancel_subscription.
        type: string
      outcome:
        description: |
          The result of the flow.
          Only present when step=result.
          Allowed values: upgrade_success, customer_canceled, error.
        type: string
      error_reason:
        description: |
          Specific reason for failure. Only present when step=result and outcome=error.
          Unexpected_exception means there may have been a network failure, validation error, server crash, etc.
          Allowed values:
          - subscription_not_found
          - customer_mismatch
          - subscription_not_active
          - stripe_price_id_not_found
          - already_canceling_at_period_end
          - current_interval_not_found
          - offering_id_not_found
          - no_cancel_interstitial_offer_found
          - no_upgrade_plan_found
          - not_eligible_for_upgrade_interval
          - general_error
          - operation_denied
          - unexpected_exception
        type: string
      offering_id:
        description: The API id of the specific subscription offering.
        type: string
      interval:
        description: Billing interval for the subscription (daily | weekly | monthly | halfyearly | yearly)
        type: string
      utm_source:
        type: string
        description: UTM source (if present).
      utm_medium:
        type: string
        description: UTM medium (if present).
      utm_campaign:
        type: string
        description: UTM campaign (if present).
      nimbus_user_id:
        description: Nimbus user ID
        type: string
