        - subplat-team@mozilla.com
      bugs:
        - FILL INNNNNNNNNN
      data_reviews:
        - FILL INNNNNNNNNN
      expires: never
      data_sensitivity:
        - interaction
      extra_keys:
        error_reason:
          description: |
            Reason for displaying error page
            Allowed values:
            - already_canceling_at_period_end
            - current_interval_not_found
            - no_cancel_interstitial_offer_found
            - no_upgrade_plan_found
            - not_eligible_for_upgrade_interval
            - offering_id_not_found
            - stripe_price_id_not_found
            - subscription_not_active
            - subscription_not_found
          type: string

    error_button_click:
      type: event
      description: |
        User clicked a button on the cancel interstitial offer error page.
      send_in_pings:
        - events
      notification_emails:
        - lchan@mozilla.com
        - subplat-team@mozilla.com
      bugs:
        - FILL INNNNNNNNNN
      data_reviews:
        - FILL INNNNNNNNNN
      expires: never
      data_sensitivity:
        - interaction
      extra_keys:
        button:
          description: |
            Allowed values:
            - back_to_subscriptions
            - continue_to_cancel
          type: string
        product_name:
          description: The name of the product that the customer is subscribed
          type: string
        offering_id:
          description: The API id of the subscribed product
          type: string
        interval:
          description: Billing interval for the subscription (monthly | yearly)
          type: string
